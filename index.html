<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Nucleus HRMS</title>
  <meta name="theme-color" content="#0a0f1e"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Nucleus HRMS"/>
  <link rel="manifest" href="/manifest.json"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0f1e}
    #root{min-height:100vh}
    #splash{position:fixed;inset:0;background:#0a0f1e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
    #splash p{color:#c9a84c;font-size:13px;margin-top:16px;font-weight:600;letter-spacing:0.1em}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
    #splash svg{animation:pulse 1.5s ease-in-out infinite}
  </style>
</head>
<body>
  <div id="splash">
    <svg width="70" height="70" viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="18" stroke="#c9a84c" stroke-width="2.5" fill="none"/>
      <circle cx="20" cy="20" r="6" fill="#c9a84c"/>
      <ellipse cx="20" cy="20" rx="18" ry="7" stroke="#e8c97a" stroke-width="1.5" fill="none" transform="rotate(45 20 20)"/>
      <ellipse cx="20" cy="20" rx="18" ry="7" stroke="#e8c97a" stroke-width="1.5" fill="none" transform="rotate(-45 20 20)"/>
    </svg>
    <p>NUCLEUS HRMS</p>
  </div>
  <div id="root"></div>
  <script type="module" src="./src/main.jsx"></script>
</body>
</html>
